name: Deploy to Beget

on:
  push:
    branches:
      - main # Настройте ветку, если ваша основная ветка называется master
  workflow_dispatch: # Позволяет запускать вручную по кнопке

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔨 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📂 Sync files (Deploy)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Папка, которая генерируется после сборки
          server-dir: ./durtuliano/public_html/ # Папка на сервере Beget, куда копируются файлы. Оставьте так.
