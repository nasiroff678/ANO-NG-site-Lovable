name: Deploy to Beget

on:
  push:
    branches:
      - main # Настройка ветки, при пуше в которую будет запускаться деплой
  workflow_dispatch: # Позволяет запускать деплой вручную из GitHub

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Обновлено с 20 до 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Sync files (Deploy)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Добавлен префикс v
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Папка, которую генерирует ваша сборка
          server-dir: /dyurtuli-ano/public_html/ # Папка на сервере Beget
